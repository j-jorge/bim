---
name: Configure, build, test.

on:
  push:
  pull_request:

concurrency:
  group: >
    ${{github.workflow }}
    -${{ github.event.pull_request.number || github.ref}}

  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      matrix:
        # Last LTS and last non-LTS.
        container: ["debian:forky", "ubuntu:25.10"]
        build_type: [release, debug]
        # Can't use Clang 21 on Ubuntu 25.10 as it is missing
        # LLVMgold.so, necessary for LTO builds.
        compiler: [g++, clang-20, clang-21]
        maybe_incremental: [--incremental, ""]
        exclude:
          - container: "debian:forky"
            compiler: clang-20
          - container: "ubuntu:25.10"
            compiler: clang-21

    steps:
      - name: Cache dependencies
        if: |
          (matrix.maybe_incremental != '')
          || (matrix.container != 'ubuntu:25.10')
          || (matrix.build_type != 'debug')
          || (matrix.compiler != 'g++')
        uses: actions/cache@v4
        with:
          key: "dependencies\
          -${{matrix.container}}\
          -${{matrix.build_type}}\
          -${{matrix.compiler}}-linux"
          path: |
            ~/.cache/ccache
            ~/.cache/iscool

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: >
          ./ci/install-minimal-environment.sh
          --compiler ${{matrix.compiler}}
          --target-platform linux

      - name: Launch build
        run: >
          ./setup.sh
          --target-platform linux
          --build-type ${{matrix.build_type}} ${{matrix.maybe_incremental}}

      # Valgrind tests runs for a single configuration only because
      # they are very slow.
      - name: Valgrind tests
        if: |
          (matrix.maybe_incremental == '')
          && (matrix.container == 'debian:forky')
          && (matrix.build_type == 'release')
          && (matrix.compiler == 'g++')
        run: >
          ./ci/run-test-programs.sh --use-valgrind build/linux/release
