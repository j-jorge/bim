---
name: Configure, build, test.

on:
  push:
  pull_request:

concurrency:
  group: >
    ${{github.workflow }}
    -${{ github.event.pull_request.number || github.ref}}

  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      matrix:
        # We want to test stable compilers (typically from Debian) and
        # recent compilers (typically from Ubuntu).
        container: ["debian:forky", "ubuntu:26.04"]
        build_type: [release, debug]
        compiler: [g++, clang-22]
        maybe_incremental: [--incremental, ""]
        exclude:
          - container: "debian:forky"
            compiler: clang-22

    steps:
      - name: Cache dependencies
        if: |
          (matrix.maybe_incremental != '')
          || (matrix.container != 'ubuntu:26.04')
          || (matrix.build_type != 'debug')
          || (matrix.compiler != 'g++')
        uses: actions/cache@v4
        with:
          key: "dependencies\
          -${{matrix.container}}\
          -${{matrix.build_type}}\
          -${{matrix.compiler}}-linux"
          path: |
            ~/.cache/ccache
            ~/.cache/iscool

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: >
          ./ci/install-minimal-environment.sh
          --compiler ${{matrix.compiler}}
          --target-platform linux

      - name: Launch build
        run: >
          ./setup.sh
          --target-platform linux
          --build-type ${{matrix.build_type}} ${{matrix.maybe_incremental}}

      # Valgrind tests runs for a single configuration only because
      # they are very slow.
      - name: Valgrind tests
        if: |
          (matrix.maybe_incremental == '')
          && (matrix.container == 'debian:forky')
          && (matrix.build_type == 'release')
          && (matrix.compiler == 'g++')
        run: >
          ./ci/run-test-programs.sh --use-valgrind build/linux/release
